<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Daily Briefing Widget</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function DailyWidget() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [endpoint, setEndpoint] = useState('');
      const [inputEndpoint, setInputEndpoint] = useState('');
      const [showSetup, setShowSetup] = useState(false);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const urlEndpoint = params.get('endpoint');
        
        if (urlEndpoint) {
          setEndpoint(urlEndpoint);
          localStorage.setItem('widgetEndpoint', urlEndpoint);
        } else {
          const saved = localStorage.getItem('widgetEndpoint');
          if (saved) {
            setEndpoint(saved);
          } else {
            setShowSetup(true);
            setLoading(false);
          }
        }
      }, []);

      useEffect(() => {
        if (!endpoint) return;

        const fetchData = async () => {
          setLoading(true);
          setError(null);
          try {
            const res = await fetch(endpoint);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();
            
            if (json.error) {
              if (json.waitingForUpdate) {
                setError('Waiting for first 8am update...');
              } else {
                setError(json.error);
              }
              setData(null);
            } else {
              setData(json);
            }
          } catch (err) {
            setError(err.message || 'Failed to fetch data');
            setData(null);
          } finally {
            setLoading(false);
          }
        };

        fetchData();
        const interval = setInterval(fetchData, 5 * 60 * 1000);
        return () => clearInterval(interval);
      }, [endpoint]);

      const handleSaveEndpoint = () => {
        if (inputEndpoint.trim()) {
          setEndpoint(inputEndpoint.trim());
          localStorage.setItem('widgetEndpoint', inputEndpoint.trim());
          setShowSetup(false);
          setInputEndpoint('');
        }
      };

      if (showSetup && !endpoint) {
        return (
          <div style={styles.container}>
            <div style={styles.setupBox}>
              <h2 style={styles.setupTitle}>Daily Briefing Widget</h2>
              <p style={styles.setupText}>Paste your Apps Script web endpoint URL below:</p>
              <input
                type="text"
                value={inputEndpoint}
                onChange={(e) => setInputEndpoint(e.target.value)}
                placeholder="https://script.google.com/..."
                style={styles.input}
                onKeyPress={(e) => e.key === 'Enter' && handleSaveEndpoint()}
              />
              <button onClick={handleSaveEndpoint} style={styles.button}>Save & Load</button>
              <p style={styles.setupHint}>The endpoint should point to your deployed Apps Script doGet function.</p>
            </div>
          </div>
        );
      }

      if (loading) {
        return (
          <div style={styles.container}>
            <div style={styles.loadingBox}>
              <div style={styles.spinner}></div>
              <p style={styles.loadingText}>Loading your briefing...</p>
            </div>
          </div>
        );
      }

      if (error) {
        return (
          <div style={styles.container}>
            <div style={styles.errorBox}>
              <p style={styles.errorText}>{error}</p>
              {error.includes('Waiting') && (
                <p style={styles.errorSubtext}>Check back at 8am when your briefing runs.</p>
              )}
              <button onClick={() => setShowSetup(true)} style={styles.secondaryButton}>Change endpoint</button>
            </div>
          </div>
        );
      }

      if (!data) {
        return (
          <div style={styles.container}>
            <div style={styles.errorBox}>
              <p style={styles.errorText}>No data available</p>
            </div>
          </div>
        );
      }

      return (
        <div style={styles.container}>
          <div style={styles.header}>
            <h1 style={styles.date}>{formatDate(data.date)}</h1>
            <button 
              onClick={() => window.location.reload()} 
              style={styles.refreshButton}
              title="Refresh"
            >
              ↻
            </button>
          </div>

          {data.calendar && data.calendar.length > 0 && (
            <Section title="Calendar" icon="📅">
              {data.calendar.map((event, i) => (
                <EventRow key={i} event={event} />
              ))}
            </Section>
          )}

          {data.monday && data.monday.length > 0 && (
            <Section title="Tasks" icon="✓">
              {data.monday.map((task, i) => (
                <TaskRow key={i} task={task} />
              ))}
            </Section>
          )}

          {data.pco && data.pco.length > 0 && (
            <Section title="Work" icon="🎵">
              {data.pco.map((shift, i) => (
                <ShiftRow key={i} shift={shift} />
              ))}
            </Section>
          )}

          {data.canvas && data.canvas.length > 0 && (
            <Section title="Canvas" icon="📚">
              {data.canvas.map((item, i) => (
                <CanvasRow key={i} item={item} />
              ))}
            </Section>
          )}

          <div style={styles.footer}>
            <p style={styles.footerText}>Last updated: {new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</p>
          </div>
        </div>
      );
    }

    function Section({ title, icon, children }) {
      return (
        <div style={styles.section}>
          <h3 style={styles.sectionTitle}>
            <span style={styles.icon}>{icon}</span> {title}
          </h3>
          <div style={styles.sectionContent}>
            {children}
          </div>
        </div>
      );
    }

    function EventRow({ event }) {
      return (
        <div style={styles.row}>
          <span style={styles.time}>{event.time}</span>
          <span style={styles.label}>{event.title}</span>
        </div>
      );
    }

    function TaskRow({ task }) {
      const priorityColor = getPriorityColor(task.priority);
      return (
        <div style={styles.row}>
          <span style={{ ...styles.badge, backgroundColor: priorityColor }}>
            {task.priority || 'None'}
          </span>
          <div style={styles.taskInfo}>
            <p style={styles.taskName}>{task.name}</p>
            {task.group && <p style={styles.taskGroup}>{task.group}</p>}
          </div>
        </div>
      );
    }

    function ShiftRow({ shift }) {
      return (
        <div style={styles.row}>
          <div style={styles.shiftInfo}>
            <p style={styles.shiftPosition}>{shift.position}</p>
            {shift.time && <p style={styles.shiftTime}>{shift.time}</p>}
          </div>
        </div>
      );
    }

    function CanvasRow({ item }) {
      return (
        <div style={styles.row}>
          <div style={styles.canvasInfo}>
            <p style={styles.canvasTitle}>{item.title}</p>
            <p style={styles.canvasCourse}>{item.course}</p>
            {item.missing && <span style={styles.missingBadge}>Missing</span>}
          </div>
        </div>
      );
    }

    function getPriorityColor(priority) {
      const lower = (priority || '').toLowerCase();
      if (lower === 'critical') return '#ef4444';
      if (lower === 'high' || lower === 'high priority') return '#f97316';
      if (lower === 'medium' || lower === 'medium priority') return '#f59e0b';
      if (lower === 'low' || lower === 'low priority') return '#22c55e';
      return '#64748b';
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr + 'T12:00:00');
      const options = { weekday: 'long', month: 'short', day: 'numeric' };
      return date.toLocaleDateString('en-US', options);
    }

    const styles = {
      container: {
        backgroundColor: '#0f172a',
        color: '#e2e8f0',
        fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
        padding: '16px',
        minHeight: '100vh',
      },
      header: {
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'center',
        marginBottom: '20px',
        paddingBottom: '12px',
        borderBottom: '1px solid #334155',
      },
      date: {
        margin: 0,
        fontSize: '20px',
        fontWeight: '600',
        color: '#f1f5f9',
      },
      refreshButton: {
        backgroundColor: 'transparent',
        border: '1px solid #475569',
        color: '#94a3b8',
        borderRadius: '6px',
        padding: '6px 10px',
        fontSize: '16px',
        cursor: 'pointer',
        transition: 'all 0.2s',
      },
      section: {
        marginBottom: '16px',
        backgroundColor: '#1e293b',
        borderRadius: '10px',
        border: '1px solid #334155',
        overflow: 'hidden',
      },
      sectionTitle: {
        margin: 0,
        padding: '12px 14px',
        fontSize: '13px',
        fontWeight: '600',
        textTransform: 'uppercase',
        letterSpacing: '0.05em',
        color: '#94a3b8',
        backgroundColor: '#0f172a',
        borderBottom: '1px solid #334155',
        display: 'flex',
        alignItems: 'center',
        gap: '8px',
      },
      icon: {
        fontSize: '16px',
      },
      sectionContent: {
        display: 'flex',
        flexDirection: 'column',
      },
      row: {
        padding: '12px 14px',
        borderTop: '1px solid #334155',
        display: 'flex',
        gap: '10px',
        alignItems: 'flex-start',
        fontSize: '13px',
      },
      time: {
        color: '#64748b',
        fontSize: '12px',
        minWidth: '60px',
        fontWeight: '500',
      },
      label: {
        color: '#cbd5e1',
        flex: 1,
      },
      badge: {
        color: '#fff',
        padding: '2px 8px',
        borderRadius: '4px',
        fontSize: '11px',
        fontWeight: '600',
        whiteSpace: 'nowrap',
        minWidth: '70px',
        textAlign: 'center',
      },
      taskInfo: {
        flex: 1,
      },
      taskName: {
        margin: '0 0 4px 0',
        color: '#cbd5e1',
        fontSize: '13px',
        fontWeight: '500',
      },
      taskGroup: {
        margin: 0,
        color: '#64748b',
        fontSize: '12px',
      },
      shiftInfo: {
        flex: 1,
      },
      shiftPosition: {
        margin: '0 0 2px 0',
        color: '#cbd5e1',
        fontWeight: '500',
      },
      shiftTime: {
        margin: 0,
        color: '#64748b',
        fontSize: '12px',
      },
      canvasInfo: {
        flex: 1,
      },
      canvasTitle: {
        margin: '0 0 4px 0',
        color: '#cbd5e1',
        fontWeight: '500',
      },
      canvasCourse: {
        margin: 0,
        color: '#64748b',
        fontSize: '12px',
      },
      missingBadge: {
        display: 'inline-block',
        backgroundColor: '#ef4444',
        color: '#fff',
        padding: '2px 6px',
        borderRadius: '3px',
        fontSize: '11px',
        fontWeight: '600',
        marginTop: '4px',
      },
      footer: {
        textAlign: 'center',
        paddingTop: '16px',
        borderTop: '1px solid #334155',
        marginTop: '16px',
      },
      footerText: {
        margin: 0,
        fontSize: '12px',
        color: '#64748b',
      },
      setupBox: {
        backgroundColor: '#1e293b',
        border: '1px solid #334155',
        borderRadius: '10px',
        padding: '20px',
        marginTop: '40px',
      },
      setupTitle: {
        margin: '0 0 12px 0',
        fontSize: '18px',
        fontWeight: '600',
        color: '#f1f5f9',
      },
      setupText: {
        margin: '0 0 16px 0',
        fontSize: '14px',
        color: '#cbd5e1',
        lineHeight: '1.5',
      },
      input: {
        width: '100%',
        padding: '10px 12px',
        marginBottom: '12px',
        backgroundColor: '#0f172a',
        border: '1px solid #475569',
        borderRadius: '6px',
        color: '#e2e8f0',
        fontSize: '13px',
        boxSizing: 'border-box',
      },
      button: {
        width: '100%',
        padding: '10px 12px',
        backgroundColor: '#3b82f6',
        color: '#fff',
        border: 'none',
        borderRadius: '6px',
        fontSize: '14px',
        fontWeight: '600',
        cursor: 'pointer',
        marginBottom: '12px',
        transition: 'background-color 0.2s',
      },
      secondaryButton: {
        padding: '8px 12px',
        backgroundColor: 'transparent',
        color: '#3b82f6',
        border: '1px solid #3b82f6',
        borderRadius: '6px',
        fontSize: '13px',
        fontWeight: '600',
        cursor: 'pointer',
        marginTop: '8px',
      },
      setupHint: {
        margin: '8px 0 0 0',
        fontSize: '12px',
        color: '#64748b',
      },
      loadingBox: {
        textAlign: 'center',
        paddingTop: '60px',
      },
      spinner: {
        width: '32px',
        height: '32px',
        border: '2px solid #334155',
        borderTop: '2px solid #3b82f6',
        borderRadius: '50%',
        animation: 'spin 0.8s linear infinite',
        margin: '0 auto 16px',
      },
      loadingText: {
        margin: 0,
        color: '#94a3b8',
        fontSize: '14px',
      },
      errorBox: {
        backgroundColor: '#1e293b',
        border: '1px solid #334155',
        borderRadius: '10px',
        padding: '20px',
        marginTop: '40px',
        textAlign: 'center',
      },
      errorText: {
        margin: '0 0 8px 0',
        color: '#ef4444',
        fontWeight: '600',
        fontSize: '14px',
      },
      errorSubtext: {
        margin: '0 0 16px 0',
        color: '#94a3b8',
        fontSize: '13px',
      },
    };

    ReactDOM.render(<DailyWidget />, document.getElementById('root'));
  </script>
</body>
</html>
